<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundTrack | Твой трекер задач</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="container_track">
        <header>
            <h1>Трекер изучения инструментов</h1>
            <p>Отслеживай свой прогресс 🎵</p>
        </header>

        <div class="add-form">
            <h2>Добавить задачу</h2>
            <div class="form-group">
                <input type="text" id="instrumentName" placeholder="Дайте название (пример: Homework)" maxlength="50">
                <button id="addBtn">+ Добавить</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalInstr">0</div>
                <div class="stat-label">Всего часов:</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="inProgressCount">0</div>
                <div class="stat-label">В процессе</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="learnedCount">0</div>
                <div class="stat-label">Изучено</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="in_progress">В процессе</button>
            <button class="filter-btn" data-filter="learned">Изучено</button>
        </div>

        <div class="Instruments-list" id="InstrumentsList"> </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
